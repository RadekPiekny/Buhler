<div class="relative h-1 overflow-hidden w-full"
     style="--bar-width: 60vw">
  @if (loading()) {
    <div class="absolute h-1 w-[var(--bar-width)] bg-primary"
         style="animation: loadingBar 1.6s ease-in-out infinite;
                transform: translateX(calc(-1 * var(--bar-width)));
                transform-origin: 0 0">
    </div>
  }
</div>
